version: "1.0"

appTitle: "AgentNxt · Chat"

mcpServers:
  simstudio:
    type: stdio
    command: node
    args:
      - /app/mcp/simstudio-mcp/index.mjs
    env:
      SIMSTUDIO_URL: http://agentstudio:3000
      SIMSTUDIO_API_KEY: "${SIMSTUDIO_API_KEY}"

  langflow:
    type: stdio
    command: node
    args:
      - /app/mcp/langflow-mcp/index.mjs
    env:
      LANGFLOW_URL: http://agentflow:7860
      LANGFLOW_API_KEY: "${LANGFLOW_API_KEY}"

  skyvern:
    type: stdio
    command: node
    args:
      - /app/mcp/skyvern-mcp/index.mjs
    env:
      SKYVERN_URL: http://skyvern:8000
      SKYVERN_API_KEY: "${SKYVERN_API_KEY}"

  agentcrew:
    type: stdio
    command: node
    args:
      - /app/mcp/agentcrew-mcp/index.mjs
    env:
      AGENTCREW_URL: http://agentcrew:8502

  ollama:
    type: stdio
    command: node
    args:
      - /app/mcp/ollama-mcp/index.mjs
    env:
      OLLAMA_URL: http://localllm:11434

  composio:
    type: sse
    url: "https://backend.composio.dev/v3/mcp/0543771c-948c-415b-87ba-3306647dfd00?include_composio_helper_actions=true&user_id=default"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"

  # --- MCP Skill Servers ---

  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /app/uploads

  memory:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"

  puppeteer:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-puppeteer"

  github:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

  notion:
    type: stdio
    command: npx
    args:
      - -y
      - "@notionhq/mcp-server-notion"
    env:
      OPENAPI_MCP_HEADERS: '{"Authorization":"Bearer ${NOTION_API_KEY}","Notion-Version":"2022-06-28"}'

  figma:
    type: stdio
    command: npx
    args:
      - -y
      - "@anthropic/mcp-server-figma"
    env:
      FIGMA_ACCESS_TOKEN: "${FIGMA_ACCESS_TOKEN}"

  firecrawl:
    type: stdio
    command: npx
    args:
      - -y
      - "firecrawl-mcp"
    env:
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"

  brave-search:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
