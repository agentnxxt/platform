##############################################################################
# AgentNext Platform — Complete AI Platform Stack (Hardened)
#
# Services: AgentFlow + LLM Gateway + ObserveLLM + LocalLLM + Billing + Auth
#
# ══════════════════════════════════════════════════════════════════════════
# REQUIRED — must be set before deployment
# ══════════════════════════════════════════════════════════════════════════
#   LITELLM_MASTER_KEY   – LLM Gateway admin key   (generate: openssl rand -hex 16)
#   LANGFUSE_PUBLIC_KEY  – ObserveLLM public key    (get from ObserveLLM UI after signup)
#   LANGFUSE_SECRET_KEY  – ObserveLLM secret key    (get from ObserveLLM UI after signup)
#   LAGO_SECRET_KEY_BASE – Billing Rails secret     (generate: openssl rand -hex 64)
#   LAGO_RSA_PRIVATE_KEY – Billing webhook key      (generate: openssl genrsa 2048 | base64)
#   LAGO_ENCRYPTION_PRIMARY_KEY       – 32 char hex (generate: openssl rand -hex 16)
#   LAGO_ENCRYPTION_DETERMINISTIC_KEY – 32 char hex (generate: openssl rand -hex 16)
#   LAGO_ENCRYPTION_KEY_DERIVATION_SALT – 32 char hex (generate: openssl rand -hex 16)
#
# ── Optional — sensible defaults provided ────────────────────────────────
#
#   AgentFlow
#   AGENTFLOW_PORT               – Host port              (default: 7860)
#   LANGFLOW_AUTO_LOGIN          – Skip login              (default: true)
#   LANGFLOW_SUPERUSER           – Admin username           (default: admin)
#   LANGFLOW_SUPERUSER_PASSWORD  – Admin password           (default: admin)
#
#   LLM Gateway
#   GATEWAY_PORT                 – Host port              (default: 4000)
#   LITELLM_UI_USERNAME          – Dashboard user          (default: admin)
#   LITELLM_UI_PASSWORD          – Dashboard password      (default: admin)
#   OPENAI_API_KEY               – OpenAI key for proxy
#   ANTHROPIC_API_KEY            – Claude key for proxy
#   GEMINI_API_KEY               – Gemini key for proxy
#
#   ObserveLLM
#   OBSERVELLM_PORT              – Host port              (default: 3150)
#   LANGFUSE_NEXT_AUTH_SECRET    – NextAuth secret         (default: changeme)
#   LANGFUSE_SALT                – Encryption salt          (default: changeme)
#
#   LocalLLM
#   LOCALLLM_PORT                – Host port              (default: 11434)
#
#   Billing
#   BILLING_API_PORT             – API host port           (default: 3200)
#   BILLING_FRONT_PORT           – Frontend host port      (default: 3201)
#   LAGO_API_KEY                 – Billing API key          (set after Billing setup)
#
#   Billing Bridge
#   BRIDGE_PORT                  – Host port              (default: 8090)
#
#   Database
#   POSTGRES_USER                – DB user                 (default: platform)
#   POSTGRES_PASSWORD            – DB password             (default: platform)
#
#   Auth Server (Logto)
#   AUTH_PORT                    – Auth UI port             (default: 3301)
#   AUTH_ADMIN_PORT              – Auth admin port          (default: 3302)
#   LOGTO_ENDPOINT               – Public auth URL          (default: http://localhost:3301)
#   LOGTO_ADMIN_ENDPOINT         – Admin console URL        (default: http://localhost:3302)
#
#   Mail Server
#   MAIL_PORT                    – HTTPS admin port        (default: 4500)
#   STALWART_HOSTNAME            – Mail FQDN               (default: mail.example.com)
#   ADMIN_SECRET                 – Mail admin password      (default: auto-generated)
#
#   LibreChat
#   LIBRECHAT_CREDS_KEY          – 32-byte hex             (generate: openssl rand -hex 32)
#   LIBRECHAT_CREDS_IV           – 16-byte hex             (generate: openssl rand -hex 16)
#   LIBRECHAT_JWT_SECRET         – JWT secret              (generate: openssl rand -hex 32)
#   LIBRECHAT_JWT_REFRESH_SECRET – JWT refresh secret      (generate: openssl rand -hex 32)
#   MEILI_MASTER_KEY             – Meilisearch master key  (generate: openssl rand -hex 24)
#
#   Typebot
#   TYPEBOT_ENCRYPTION_SECRET    – 32-char secret          (generate: openssl rand -hex 16)
#   SMTP_PASSWORD                – Stalwart SMTP password  (default: Autonomyx@2025!)
##############################################################################

# ── Shared hardening defaults ────────────────────────────────────────────
x-hardened: &hardened
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

x-internal-only: &internal-only
  <<: *hardened
  networks:
    - internal

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    internal: true

services:
  # ══════════════════════════════════════════════════════════════════════
  # Caddy — Reverse Proxy + Auto SSL (Let's Encrypt)
  # ══════════════════════════════════════════════════════════════════════
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./agentstudio/custom:/srv/agentstudio/custom:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ══════════════════════════════════════════════════════════════════════
  # AgentFlow — AI Workflow Builder (Langflow)
  # ══════════════════════════════════════════════════════════════════════
  agentflow:
    image: langflowai/langflow:latest
    pull_policy: always
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${AGENTFLOW_PORT:-7860}:7860"
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/agentflow
      - LANGFLOW_CONFIG_DIR=/app/langflow
      - LANGFLOW_AUTO_LOGIN=${LANGFLOW_AUTO_LOGIN:-true}
      - LANGFLOW_SUPERUSER=${LANGFLOW_SUPERUSER:-admin}
      - LANGFLOW_SUPERUSER_PASSWORD=${LANGFLOW_SUPERUSER_PASSWORD:-admin}
      - LANGFLOW_SECRET_KEY=${LANGFLOW_SECRET_KEY:-}
      - LANGFLOW_LOG_LEVEL=${LANGFLOW_LOG_LEVEL:-info}
      - OPENAI_API_BASE=http://gateway:4000
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - OLLAMA_BASE_URL=http://localllm:11434
      # Tracing → ObserveLLM (Langfuse)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://observellm:3000
    volumes:
      - agentflow_data:/app/langflow
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy

  agentflow-proxy:
    image: nginx:alpine
    restart: unless-stopped
    <<: *internal-only
    volumes:
      - ./agentflow/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./agentstudio/nginx/analytics-init.js:/etc/nginx/static/analytics-init.js:ro
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - agentflow

  agentcrew-proxy:
    image: nginx:alpine
    restart: unless-stopped
    <<: *internal-only
    volumes:
      - ./agentcrew/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./agentstudio/nginx/analytics-init.js:/etc/nginx/static/analytics-init.js:ro
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - agentcrew

  # ══════════════════════════════════════════════════════════════════════
  # LLM Gateway — Unified LLM Proxy (LiteLLM)
  # ══════════════════════════════════════════════════════════════════════
  gateway:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - UI_USERNAME=${LITELLM_UI_USERNAME:-admin}
      - UI_PASSWORD=${LITELLM_UI_PASSWORD:-admin}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/gateway
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://observellm:3000
      - STORE_MODEL_IN_DB=True
    volumes:
      - ./gateway/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # ObserveLLM — LLM Tracing & Observability (Langfuse)
  # ══════════════════════════════════════════════════════════════════════
  observellm:
    image: langfuse/langfuse:2
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${OBSERVELLM_PORT:-3150}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/observellm
      - NEXTAUTH_URL=http://localhost:${OBSERVELLM_PORT:-3150}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXT_AUTH_SECRET:-changeme}
      - SALT=${LANGFUSE_SALT:-changeme}
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # LocalLLM — Local Model Inference (Ollama)
  # ══════════════════════════════════════════════════════════════════════
  localllm:
    image: ollama/ollama:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_RESOURCE
    ports:
      - "${LOCALLLM_PORT:-11434}:11434"
    volumes:
      - localllm_data:/root/.ollama
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 512M
    # Uncomment for GPU support (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ══════════════════════════════════════════════════════════════════════
  # Billing API — Usage-Based Metering (Lago)
  # ══════════════════════════════════════════════════════════════════════
  billing-api:
    image: getlago/api:v1.44.0
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${BILLING_API_PORT:-3200}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@billing-db:5432/billing
      - REDIS_URL=redis://billing-redis:6379
      - SECRET_KEY_BASE=${LAGO_SECRET_KEY_BASE:-changeme_generate_with_openssl_rand_hex_64}
      - LAGO_RSA_PRIVATE_KEY=${LAGO_RSA_PRIVATE_KEY:-}
      - LAGO_ENCRYPTION_PRIMARY_KEY=${LAGO_ENCRYPTION_PRIMARY_KEY:-changeme32charalphanumerickey12}
      - LAGO_ENCRYPTION_DETERMINISTIC_KEY=${LAGO_ENCRYPTION_DETERMINISTIC_KEY:-changeme32charalphanumerickey34}
      - LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${LAGO_ENCRYPTION_KEY_DERIVATION_SALT:-changeme32charalphanumerickey56}
      - LAGO_API_URL=http://localhost:${BILLING_API_PORT:-3200}
      - LAGO_FRONT_URL=http://localhost:${BILLING_FRONT_PORT:-3201}
      - LAGO_PDF_URL=http://billing-pdf:3000
      - LAGO_SIDEKIQ_WEB=true
      - LAGO_DISABLE_SIGNUP=false
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    depends_on:
      billing-db:
        condition: service_healthy
      billing-redis:
        condition: service_started

  billing-front:
    image: getlago/front:v1.44.0
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "${BILLING_FRONT_PORT:-3201}:80"
    environment:
      - API_URL=http://billing-api:3000
      - APP_ENV=production
    networks:
      - frontend
    depends_on:
      - billing-api

  billing-worker:
    image: getlago/api:v1.44.0
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - NET_BIND_SERVICE
    command: ["./scripts/start.worker.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@billing-db:5432/billing
      - REDIS_URL=redis://billing-redis:6379
      - SECRET_KEY_BASE=${LAGO_SECRET_KEY_BASE:-changeme_generate_with_openssl_rand_hex_64}
      - LAGO_RSA_PRIVATE_KEY=${LAGO_RSA_PRIVATE_KEY:-}
      - LAGO_ENCRYPTION_PRIMARY_KEY=${LAGO_ENCRYPTION_PRIMARY_KEY:-changeme32charalphanumerickey12}
      - LAGO_ENCRYPTION_DETERMINISTIC_KEY=${LAGO_ENCRYPTION_DETERMINISTIC_KEY:-changeme32charalphanumerickey34}
      - LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${LAGO_ENCRYPTION_KEY_DERIVATION_SALT:-changeme32charalphanumerickey56}
      - LAGO_API_URL=http://localhost:${BILLING_API_PORT:-3200}
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      - billing-api

  billing-clock:
    image: getlago/api:v1.44.0
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - NET_BIND_SERVICE
    command: ["./scripts/start.clock.sh"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@billing-db:5432/billing
      - REDIS_URL=redis://billing-redis:6379
      - SECRET_KEY_BASE=${LAGO_SECRET_KEY_BASE:-changeme_generate_with_openssl_rand_hex_64}
      - LAGO_RSA_PRIVATE_KEY=${LAGO_RSA_PRIVATE_KEY:-}
      - LAGO_ENCRYPTION_PRIMARY_KEY=${LAGO_ENCRYPTION_PRIMARY_KEY:-changeme32charalphanumerickey12}
      - LAGO_ENCRYPTION_DETERMINISTIC_KEY=${LAGO_ENCRYPTION_DETERMINISTIC_KEY:-changeme32charalphanumerickey34}
      - LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${LAGO_ENCRYPTION_KEY_DERIVATION_SALT:-changeme32charalphanumerickey56}
      - LAGO_API_URL=http://billing-api:3000
      - RAILS_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - billing-api

  billing-redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    deploy:
      resources:
        limits:
          memory: 256M

  billing-pdf:
    image: getlago/lago-gotenberg:7.8.2
    restart: unless-stopped
    <<: *internal-only
    deploy:
      resources:
        limits:
          memory: 512M

  billing-db:
    image: getlago/postgres-partman:15.0-alpine
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platform}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-platform}
      - POSTGRES_DB=billing
      - PGDATA=/data/postgres
    volumes:
      - billing_db_data:/data/postgres
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════════════════════
  # Billing Bridge — ObserveLLM → Billing Metering
  # ══════════════════════════════════════════════════════════════════════
  billing-bridge:
    image: python:3.12-slim
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${BRIDGE_PORT:-8090}:8090"
    environment:
      - LAGO_API_URL=http://billing-api:3000
      - LAGO_API_KEY=${LAGO_API_KEY:-}
      - BRIDGE_PORT=8090
      - LANGFUSE_URL=http://observellm:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - POLL_INTERVAL=30
      - LAGO_PLAN_CODE=standard
    volumes:
      - ./bridge/bridge.py:/app/bridge.py:ro
    command: ["python3", "-u", "/app/bridge.py"]
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - billing-api

  # ══════════════════════════════════════════════════════════════════════
  # Auth Server — SSO & Identity (Logto)
  # ══════════════════════════════════════════════════════════════════════
  auth:
    image: svhd/logto:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${AUTH_PORT:-3301}:3001"
      - "${AUTH_ADMIN_PORT:-3302}:3002"
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/auth
      - ENDPOINT=${LOGTO_ENDPOINT:-http://localhost:3301}
      - ADMIN_ENDPOINT=${LOGTO_ADMIN_ENDPOINT:-http://localhost:3302}
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # Mail Server (Stalwart)
  # ══════════════════════════════════════════════════════════════════════
  mailserver:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${MAIL_PORT:-4500}:443"
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "4190:4190"
    environment:
      - STALWART_HOSTNAME=${STALWART_HOSTNAME:-mail.example.com}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
    volumes:
      - mailserver_data:/opt/stalwart
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ══════════════════════════════════════════════════════════════════════
  # Shared Database (PostgreSQL)
  # ══════════════════════════════════════════════════════════════════════
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platform}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-platform}
    volumes:
      - ./db/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════════════════════
  # Shared Redis — used by AgentStudio + future services
  # ══════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 384M

  # ══════════════════════════════════════════════════════════════════════
  # Vector DB — Qdrant
  # ══════════════════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ══════════════════════════════════════════════════════════════════════
  # Content API — Agentic Content Service (FastAPI + RAG)
  # ══════════════════════════════════════════════════════════════════════
  content-api:
    image: ghcr.io/agentnxxt/content-api:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${CONTENT_API_PORT:-8100}:8100"
    environment:
      - OLLAMA_URL=http://localllm:11434
      - QDRANT_URL=http://qdrant:6333
      - LITELLM_URL=http://gateway:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - ORCHESTRATOR_URL=http://content-orchestrator:8200
      - API_PORT=8100
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - localllm
      - qdrant
      - gateway

  # ══════════════════════════════════════════════════════════════════════
  # Content Orchestrator — Temporal Worker (research → write → repurpose)
  # ══════════════════════════════════════════════════════════════════════
  content-orchestrator:
    image: ghcr.io/agentnxxt/content-orchestrator:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${CONTENT_ORCHESTRATOR_PORT:-8200}:8200"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - OLLAMA_URL=http://localllm:11434
      - LITELLM_URL=http://gateway:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - DEFAULT_MODEL=qwen2.5:7b
      - FAST_MODEL=phi3.5:latest
      - ORCHESTRATOR_PORT=8200
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - temporal
      - localllm
      - gateway

  # ══════════════════════════════════════════════════════════════════════
  # Content Studio — Next.js 15 Dashboard
  # ══════════════════════════════════════════════════════════════════════
  content-studio:
    image: ghcr.io/agentnxxt/content-studio:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${CONTENT_STUDIO_PORT:-3600}:3600"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.agnxxt.com
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - content-api

  # ══════════════════════════════════════════════════════════════════════
  # AgentStudio — AI Workflow Builder (Sim.ai / SimStudio)
  # ══════════════════════════════════════════════════════════════════════
  agentstudio-db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    <<: *internal-only
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platform}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-platform}
      - POSTGRES_DB=simstudio
      - PGDATA=/data/postgres
    volumes:
      - agentstudio_db_data:/data/postgres
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agentstudio-migrate:
    image: ghcr.io/simstudioai/migrations:latest
    restart: "no"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@agentstudio-db:5432/simstudio
    networks:
      - internal
    depends_on:
      agentstudio-db:
        condition: service_healthy

  agentstudio-branding:
    image: nginx:alpine
    restart: unless-stopped
    <<: *internal-only
    volumes:
      - ./agentstudio/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./agentstudio/nginx/analytics-init.js:/etc/nginx/static/analytics-init.js:ro
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - agentstudio

  agentstudio:
    image: ghcr.io/simstudioai/simstudio:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${AGENTSTUDIO_PORT:-3400}:3000"
    volumes:
      - ./agentstudio/public/icon.svg:/app/apps/sim/public/icon.svg:ro
      - ./agentstudio/public/favicon/favicon.svg:/app/apps/sim/public/favicon/favicon.svg:ro
      - ./agentstudio/public/logo/sim-landing.svg:/app/apps/sim/public/logo/sim-landing.svg:ro
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@agentstudio-db:5432/simstudio
      - REDIS_URL=redis://redis:6379/2
      - BETTER_AUTH_SECRET=${AGENTSTUDIO_AUTH_SECRET:-changeme_generate_openssl_rand_hex_32}
      - BETTER_AUTH_URL=https://agentstudio.agnxxt.com
      - ENCRYPTION_KEY=${AGENTSTUDIO_ENCRYPTION_KEY:-changeme_32chars_exactly_here_ok_}
      - API_ENCRYPTION_KEY=${AGENTSTUDIO_API_KEY:-changeme_32chars_api_key_here_ok__}
      - INTERNAL_API_SECRET=${AGENTSTUDIO_INTERNAL_SECRET:-changeme_internal_secret_key_here}
      - NEXT_PUBLIC_APP_URL=https://agentstudio.agnxxt.com
      - NEXT_PUBLIC_SOCKET_URL=https://agentstudio-realtime.agnxxt.com
      - SOCKET_SERVER_URL=http://agentstudio-realtime:3002
      - OLLAMA_URL=http://localllm:11434
      # Open source models route through LLM gateway (LiteLLM → Ollama)
      # Cloud models (OpenAI, Anthropic) are configured per-user in SimStudio UI
      - OPENAI_API_BASE=http://gateway:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      # SimStudio copilot — managed cloud service (sim.ai)
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      # Traces → ObserveLLM (Langfuse)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASEURL=http://observellm:3000
      # Email — Stalwart SMTP
      - EMAIL_SERVER_HOST=mailserver
      - EMAIL_SERVER_PORT=587
      - EMAIL_SERVER_USER=noreply@agnxxt.com
      - EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD:-Autonomyx@2025!}
      - EMAIL_FROM=AgentStudio <noreply@agnxxt.com>
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      agentstudio-db:
        condition: service_healthy
      agentstudio-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      gateway:
        condition: service_started

  agentstudio-realtime:
    image: ghcr.io/simstudioai/realtime:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${AGENTSTUDIO_REALTIME_PORT:-3401}:3002"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@agentstudio-db:5432/simstudio
      - REDIS_URL=redis://redis:6379/2
      - INTERNAL_API_SECRET=${AGENTSTUDIO_INTERNAL_SECRET:-changeme_internal_secret_key_here}
      - NEXT_PUBLIC_APP_URL=https://agentstudio.agnxxt.com
      - PORT=3002
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - redis
      - agentstudio

  # ══════════════════════════════════════════════════════════════════════
  # AgentCrew — CrewAI Studio (community UI for CrewAI agents)
  # ══════════════════════════════════════════════════════════════════════
  agentcrew:
    image: ghcr.io/agentnxxt/agentcrew:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${AGENTCREW_PORT:-3410}:8501"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platform}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-platform}
      - POSTGRES_DB=agentcrew
      - POSTGRES_HOST=db
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - OPENAI_API_BASE=http://gateway:4000/v1
      - OPENAI_PROXY_MODELS=openai/gpt-4o,openai/gpt-4o-mini,anthropic/claude-3-5-sonnet,anthropic/claude-3-haiku
      - OLLAMA_HOST=http://localllm:11434
      - OLLAMA_MODELS=qwen2.5:7b,phi3.5
      - DB_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/agentcrew
      # Tracing → ObserveLLM (Langfuse)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://observellm:3000
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy

  # AgentSkills (agentnxxt/agentskills) is a Claude skill library (markdown/ZIP),
  # not a web service — no Dockerfile, no port. Referenced here for documentation.
  # Skills are loaded directly by Claude agents at runtime.

  # ══════════════════════════════════════════════════════════════════════
  # SurrealDB — Multi-model Decision Store (graph + doc + vector + temporal)
  # ══════════════════════════════════════════════════════════════════════
  surrealdb:
    image: surrealdb/surrealdb:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    ports:
      - "${SURREALDB_PORT:-8000}:8000"
    command: ["start", "--bind", "0.0.0.0:8000", "--user", "root", "--pass", "${SURREALDB_PASSWORD:-surrealdb}", "memory"]
    volumes:
      - surrealdb_data:/data
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ══════════════════════════════════════════════════════════════════════
  # Camunda 7 — DMN Decision Engine + Cockpit + Tasklist
  # ══════════════════════════════════════════════════════════════════════
  camunda:
    image: camunda/camunda-bpm-platform:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${CAMUNDA_PORT:-8083}:8080"
    environment:
      - DB_DRIVER=org.postgresql.Driver
      - DB_URL=jdbc:postgresql://db:5432/camunda
      - DB_USERNAME=${POSTGRES_USER:-platform}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-platform}
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # OPA — Open Policy Agent (Decision Governance)
  # ══════════════════════════════════════════════════════════════════════
  opa:
    image: openpolicyagent/opa:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${OPA_PORT:-8181}:8181"
    command: ["run", "--server", "--log-level", "info", "--log-format", "json"]
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ══════════════════════════════════════════════════════════════════════
  # Prometheus — Metrics Collection
  # ══════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ══════════════════════════════════════════════════════════════════════
  # Grafana — Unified Dashboards
  # ══════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "${GRAFANA_PORT:-3500}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://${SERVER_IP:-localhost}:${GRAFANA_PORT:-3500}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - prometheus

  # ══════════════════════════════════════════════════════════════════════
  # Evidently — ML Model Drift Detection & Monitoring UI
  # ══════════════════════════════════════════════════════════════════════
  evidently:
    image: python:3.11-slim
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${EVIDENTLY_PORT:-8085}:8085"
    command: >
      bash -c "pip install evidently --quiet &&
      python -m evidently.ui --workspace /data/workspace --host 0.0.0.0 --port 8085"
    volumes:
      - evidently_data:/data
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ══════════════════════════════════════════════════════════════════════
  # Marquez — OpenLineage / Decision Lineage
  # ══════════════════════════════════════════════════════════════════════
  marquez:
    image: marquezproject/marquez:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${MARQUEZ_PORT:-5100}:5000"
    environment:
      - MARQUEZ_CONFIG=/opt/marquez/marquez.yml
    volumes:
      - ./marquez/marquez.yml:/opt/marquez/marquez.yml:ro
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${MARQUEZ_WEB_PORT:-5101}:3000"
    environment:
      - MARQUEZ_HOST=marquez
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - marquez

  # ══════════════════════════════════════════════════════════════════════
  # Argilla — Human Feedback & RLHF (v2, PostgreSQL-backed)
  # ══════════════════════════════════════════════════════════════════════
  argilla:
    image: argilla/argilla-server:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${ARGILLA_PORT:-6900}:6900"
    environment:
      - ARGILLA_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/argilla
      - ARGILLA_AUTH_SECRET_KEY=${ARGILLA_SECRET_KEY:-changeme_argilla_secret_32chars__}
      - USERNAME=argilla
      - PASSWORD=${ARGILLA_PASSWORD:-adminpass1}
      - API_KEY=${ARGILLA_API_KEY:-argilla.apikey}
    volumes:
      - argilla_data:/home/argilla
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # GlitchTip — Error Tracking (open-source Sentry alternative)
  # ══════════════════════════════════════════════════════════════════════
  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    pull_policy: always
    restart: "no"
    command: "./manage.py migrate"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-changeme_glitchtip_secret_key_32c}
      - GLITCHTIP_DOMAIN=https://errors.agnxxt.com
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  glitchtip:
    image: glitchtip/glitchtip:latest
    pull_policy: always
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${GLITCHTIP_PORT:-8300}:8080"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/glitchtip
      - REDIS_URL=redis://redis:6379/5
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-changeme_glitchtip_secret_key_32c}
      - GLITCHTIP_DOMAIN=https://errors.agnxxt.com
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-errors@agnxxt.com}
      - EMAIL_URL=smtp://noreply@agnxxt.com:Autonomyx@2025!@mailserver:587
      - ENABLE_OPEN_USER_REGISTRATION=False
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    pull_policy: always
    restart: unless-stopped
    <<: *internal-only
    command: "./bin/run-celery-with-beat.sh"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/glitchtip
      - REDIS_URL=redis://redis:6379/5
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-changeme_glitchtip_secret_key_32c}
      - GLITCHTIP_DOMAIN=https://errors.agnxxt.com
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-errors@agnxxt.com}
      - EMAIL_URL=smtp://noreply@agnxxt.com:Autonomyx@2025!@mailserver:587
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - glitchtip
      - redis

  # ══════════════════════════════════════════════════════════════════════
  # MLflow — Model Registry & Experiment Tracking
  # ══════════════════════════════════════════════════════════════════════
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts=*
    volumes:
      - mlflow_data:/mlflow/artifacts
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════
  # Temporal — Durable Workflow / Decision Execution
  # ══════════════════════════════════════════════════════════════════════
  temporal:
    image: temporalio/auto-setup:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=db
      - POSTGRES_USER=${POSTGRES_USER:-platform}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-platform}
      - SKIP_DB_CREATE=true
      - DEFAULT_NAMESPACE_RETENTION=72h
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${TEMPORAL_UI_PORT:-8088}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://${SERVER_IP:-localhost}:${TEMPORAL_UI_PORT:-8088}
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - temporal

  # ══════════════════════════════════════════════════════════════════════
  # NATS JetStream — Messaging Fabric
  # ══════════════════════════════════════════════════════════════════════
  nats:
    image: nats:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    command: ["--jetstream", "--http_port", "8222", "--store_dir", "/data"]
    volumes:
      - nats_data:/data
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ══════════════════════════════════════════════════════════════════════
  # Skyvern — Vision-based Browser Automation (skyvern.agnxxt.com)
  # ══════════════════════════════════════════════════════════════════════
  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${SKYVERN_PORT:-8300}:8000"
    environment:
      - DATABASE_STRING=postgresql+psycopg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/skyvern
      - BROWSER_TYPE=chromium-headless
      - ENABLE_OPENAI=true
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - OPENAI_API_BASE=http://gateway:4000/v1
      - LLM_KEY=OPENAI_API4O
      - SECONDARY_LLM_KEY=OPENAI_API4O_MINI
      - PORT=8000
      - ENV=production
      - MAX_STEPS_PER_RUN=50
      - ANALYTICS_ID=anonymous
      # Tracing → ObserveLLM (Langfuse)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://observellm:3000
    volumes:
      - skyvern_artifacts:/data/artifacts
      - skyvern_videos:/data/videos
      - skyvern_har:/data/har
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      gateway:
        condition: service_started

  skyvern-ui:
    image: public.ecr.aws/skyvern/skyvern-ui:latest
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${SKYVERN_UI_PORT:-8301}:8080"
    environment:
      - VITE_WSS_BASE_URL=wss://skyvern.agnxxt.com
      - VITE_API_BASE_URL=https://skyvern.agnxxt.com
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - skyvern

  # ══════════════════════════════════════════════════════════════════════
  # LibreChat — AI Chat Interface (chat.agnxxt.com)
  # ══════════════════════════════════════════════════════════════════════
  librechat-mongodb:
    image: mongo:8.0.20
    restart: unless-stopped
    <<: *internal-only
    volumes:
      - librechat_mongodb_data:/data/db
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  librechat-meilisearch:
    image: getmeili/meilisearch:v1.35.1
    restart: unless-stopped
    <<: *internal-only
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme_meili_master_key_min24chars}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - librechat_meilisearch_data:/meili_data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  librechat:
    image: ghcr.io/danny-avila/librechat:v0.8.4
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${LIBRECHAT_PORT:-3600}:3080"
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://librechat-mongodb:27017/LibreChat
      - DOMAIN_CLIENT=https://chat.agnxxt.com
      - DOMAIN_SERVER=https://chat.agnxxt.com
      - CREDS_KEY=${LIBRECHAT_CREDS_KEY:-changeme32bytehexkeychangeme3200}
      - CREDS_IV=${LIBRECHAT_CREDS_IV:-changeme16bytehex}
      - JWT_SECRET=${LIBRECHAT_JWT_SECRET:-changeme_jwt_secret_key_here_min32}
      - JWT_REFRESH_SECRET=${LIBRECHAT_JWT_REFRESH_SECRET:-changeme_jwt_refresh_secret_here}
      - MEILI_HOST=http://librechat-meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme_meili_master_key_min24chars}
      - USE_REDIS=true
      - REDIS_URI=redis://redis:6379/3
      # LLM — route all providers through gateway
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - OPENAI_REVERSE_PROXY=http://gateway:4000/v1
      - ANTHROPIC_API_KEY=${LITELLM_MASTER_KEY:-sk-master}
      - ANTHROPIC_REVERSE_PROXY=http://gateway:4000/v1
      # Tracing → ObserveLLM (Langfuse)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=http://observellm:3000
      - ALLOW_REGISTRATION=true
      - ALLOW_SOCIAL_LOGIN=false
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - librechat-mongodb
      - librechat-meilisearch
      - redis
      - gateway

  # ══════════════════════════════════════════════════════════════════════
  # Typebot — Visual Chatbot Builder (typebot.agnxxt.com + bot.agnxxt.com)
  # ══════════════════════════════════════════════════════════════════════
  typebot-builder:
    image: baptistearno/typebot-builder:3.15.2
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${TYPEBOT_BUILDER_PORT:-3700}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/typebot
      - REDIS_URL=redis://redis:6379/4
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET:-changeme_32char_secret_key_here!}
      - NEXTAUTH_URL=https://typebot.agnxxt.com
      - NEXT_PUBLIC_VIEWER_URL=https://bot.agnxxt.com
      - NODE_OPTIONS=--no-node-snapshot
      # Email — magic link login via Stalwart
      - SMTP_USERNAME=noreply@agnxxt.com
      - SMTP_PASSWORD=${SMTP_PASSWORD:-Autonomyx@2025!}
      - SMTP_HOST=mailserver
      - SMTP_PORT=587
      - SMTP_AUTH_DISABLED=false
      - NEXT_PUBLIC_SMTP_FROM=AgentStudio <noreply@agnxxt.com>
      - ADMIN_EMAIL=${TYPEBOT_ADMIN_EMAIL:-admin@agnxxt.com}
      # Disable telemetry
      - NEXT_PUBLIC_POSTHOG_KEY=
      - NEXT_PUBLIC_HOTJAR_ID=
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  typebot-viewer:
    image: baptistearno/typebot-viewer:3.15.2
    restart: unless-stopped
    <<: *hardened
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${TYPEBOT_VIEWER_PORT:-3701}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@db:5432/typebot
      - REDIS_URL=redis://redis:6379/4
      - ENCRYPTION_SECRET=${TYPEBOT_ENCRYPTION_SECRET:-changeme_32char_secret_key_here!}
      - NEXTAUTH_URL=https://typebot.agnxxt.com
      - NEXT_PUBLIC_VIEWER_URL=https://bot.agnxxt.com
      - NODE_OPTIONS=--no-node-snapshot
    networks:
      - frontend
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

