name: Build, Push & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'agentcrew/**'
      - 'docker-compose.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: agentnxxt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: content-api
            context: .
            dockerfile: apps/content-api/Dockerfile
          - name: content-orchestrator
            context: .
            dockerfile: apps/content-orchestrator/Dockerfile
          - name: content-studio
            context: .
            dockerfile: apps/content-studio/Dockerfile
          - name: agentcrew
            context: agentcrew
            dockerfile: agentcrew/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to unboxd.cloud
        uses: appleboy/ssh-action@v1
        with:
          host: unboxd.cloud
          username: ubuntu
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd ~/platform
            git pull
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
