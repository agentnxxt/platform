server {
    listen 8502;

    proxy_set_header Accept-Encoding "";

    location = /analytics-init.js {
        alias /etc/nginx/static/analytics-init.js;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /branding/favicon.svg {
        alias /etc/nginx/static/favicon.svg;
        add_header Content-Type "image/svg+xml";
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://agentcrew:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;

        sub_filter '</head>' '<link rel="icon" type="image/svg+xml" href="/branding/favicon.svg"><script src="/analytics-init.js" defer></script></head>';
        sub_filter '<title>CrewAI Studio</title>' '<title>AgentNxt · AgentCrew</title>';
        sub_filter '>CrewAI Studio<' '>AgentCrew<';
        sub_filter 'CrewAI Studio' 'AgentCrew';
        sub_filter_once off;
        sub_filter_types text/html;
    }
}
