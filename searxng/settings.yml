# SearXNG settings — AgentNext Platform
# Optimised for agent/API use: JSON enabled, limiter off, all major engines active

use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: en

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json   # required for agent API calls

engines:
  # ── Web ──────────────────────────────────────────────────────
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  # ── News ─────────────────────────────────────────────────────
